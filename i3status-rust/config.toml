icons_format = "{icon}"

[theme]
theme = "srcery"
[theme.overrides]
idle_bg = "#181616"
idle_fg = "#a6a69c"
good_fg = "#8a9a7b"
critical_fg = "#e46876"
warning_fg = "#b6927b"

[icons]
icons = "awesome6"
[icons.overrides]
#https://www.nerdfonts.com/cheat-sheet for more icons
#ONLY if using Hack Nerd Font
memory_mem = "\uefc5"
memory_swap = "SWP"
cpu = "\uf4bc"

[[block]]
block = "battery"
format = "$icon $percentage {$time_remaining.dur(hms:true, min_unit:m) |}"
full_format = "$icon $percentage {$time_remaining.dur(hms:true, min_unit:m) |}"
device = "DisplayDevice"
driver = "upower"

[[block]]
block = "memory"
format = " $icon $mem_total_used_percents.eng(w:2) "
format_alt = " $icon_swap $swap_used_percents.eng(w:2) "

[[block]]
block = "sound"
[[block.click]]
button = "left"
cmd = "pavucontrol"

[[block]]
block = "time"
interval = 5
format = " $timestamp.datetime(f:'%a %d/%m %R') "

[[block]]
block = "docker"
interval = 2
format = " $icon $running/$total "

[[block]]
block = "net"
format = " $icon  $ssid"

[[block]]
block = "cpu"
interval = 1
format = " $icon $utilization "
format_alt = " $icon $frequency{ $boost|} "
info_cpu = 50
warning_cpu = 50
critical_cpu = 90

